function doQuery(){
var input=document.getElementById('cno').value.trim();
if(!input){alert(t('placeholder'));return;}
var codes=input.split(/[\n,，\s;；]+/).filter(function(c){return c.trim()!=='';});
if(codes.length===0){alert(t('placeholder'));return;}
var found=[],notFound=[];
for(var i=0;i<codes.length;i++){
var code=codes[i].trim();
var d=orderData[code];
if(d){found.push({code:code,data:d});}else{notFound.push(code);}
}
if(found.length===0){
document.getElementById('titlePrefix').innerHTML='【'+t('batchQuery')+'】'+t('shipInfo');
document.getElementById('titleTicket').innerHTML=t('ticket')+'0'+t('ticket2');
var msg='<div class="no-data">';
for(var i=0;i<notFound.length;i++){msg+=notFound[i]+' - '+t('notFoundMsg')+'<br>';}
msg+='</div>';
document.getElementById('resultBody').innerHTML=msg;
return;
}
document.getElementById('titlePrefix').innerHTML='【'+t('batchQuery')+'】'+t('total')+codes.length+t('pieces');
document.getElementById('titleTicket').innerHTML=t('found')+found.length+t('pieces')+'，'+t('notFound')+notFound.length+t('pieces');
var html='';
for(var n=0;n<found.length;n++){
var d=found[n].data,code=found[n].code;
html+='<div class="data-row">';
html+='<div class="order-header">'+code+'</div>';
html+='<div class="order-info">';
html+='<span><span class="label">'+t('refNo')+':</span> <span class="value">'+(d.refNo||'-')+'</span></span>';
html+='<span><span class="label">'+t('trackNo')+':</span> <span class="value">'+d.trackNo+'</span></span>';
html+='<span><span class="label">'+t('dest')+':</span> <span class="value">'+d.destination+'</span></span>';
html+='<span><span class="label">'+t('localTime')+':</span> <span class="value">'+d.localTime+'</span></span>';
html+='<span><span class="label">'+t('status')+':</span> <span class="value">'+d.status+'</span></span>';
html+='<span><span class="label">'+t('receiver')+':</span> <span class="value">'+(d.receiver||'-')+'</span></span>';
html+='</div>';
if(d.receiverInfo){
var ri=d.receiverInfo;
html+='<div class="order-info" style="border-bottom:1px solid #dcddd7;background:#fafafa">';
html+='<span class="label">'+t('receiverInfo')+':</span> ';
html+='</div>';
}
if(d.records&&d.records.length>0){
html+='<table class="track-table">';
html+='<tr><th>'+t('time')+'</th><th>'+t('location')+'</th><th>'+t('desc')+'</th></tr>';
for(var m=0;m<d.records.length;m++){
var r=d.records[m];
html+='<tr><td>'+r.time+'</td><td>'+r.location+'</td><td>'+r.desc+'</td></tr>';
}
html+='</table>';
}
html+='</div>';
}
if(notFound.length>0){
html+='<div class="no-data" style="margin-top:5px;">'+t('notFound')+'：'+notFound.join('、')+'</div>';
}
document.getElementById('resultBody').innerHTML=html;
}
</script>
