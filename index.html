    function doQuery() {
        var code = document.getElementById('cno').value.trim();
        if (!code) { alert('请输入追踪号码'); return; }
        var d = orderData[code];
        if (!d) {
            document.getElementById('titlePrefix').innerHTML = '【' + code + '】运单信息';
            document.getElementById('titleTicket').innerHTML = '第0票';
            document.getElementById('resultBody').innerHTML = '<div class="no-data">未找到该运单信息</div>';
            return;
        }
        currentCode = code;
        document.getElementById('titlePrefix').innerHTML = '【' + code + '】运单信息 件数:【' + d.pieces + '】';
        document.getElementById('titleTicket').innerHTML = '第1票';
        var html = '<div class="data-row">';
        html += '<ul>';
        html += '<li class="data-col1">' + (d.refNo || '&nbsp;') + '</li>';
        html += '<li class="data-col2">' + d.trackNo + '</li>';
        html += '<li class="data-col3">' + d.destination + '</li>';
        html += '<li class="data-col4">' + d.localTime + '</li>';
        html += '<li class="data-col5">' + d.status + '</li>';
        html += '<li class="data-col6">' + (d.receiver || '&nbsp;') + '</li>';
        html += '</ul>';
        html += '<div class="data-row" style="width:100%">';
        html += '    <ul>';
        html += '        <li class="op-col">';
        html += '            <button class="btnch" onclick="selectFile()">附件</button>';
        html += '            <button class="btnch" onclick="downloadTrackFile()">下载</button>';
        html += '            <button class="btnch" onclick="viewTrackDetail()">物流轨迹</button>';
        html += '        </li>';
        html += '    </ul>';
        html += '</div>';
        html += '</div>';
        document.getElementById('resultBody').innerHTML = html;
    }

    function selectFile() {
        var tableBody = document.querySelector('#fileBody tbody');
        tableBody.innerHTML = '<tr height="120px;"><td width="30%;" align="center"><img src="images/logo.png" width="120px;" height="100px;" /></td></tr>';
        document.getElementById('fileDialog').classList.remove('hide');
    }

    var currentCode = '';
    function viewTrackDetail() {
        var d = orderData[currentCode];
        if (!d || !d.receiverInfo) { alert('无收件人信息'); return; }
        var ri = d.receiverInfo;
        var recs = d.records || [];
        var html = '<div class="menu_" style="margin-top:15px;">';
        html += '<div style="border:1px solid #dcddd7;padding:8px;background:#f0f5ff;font-weight:600;color:#1d2088;">收件人信息</div>';
        html += '<div style="border:1px solid #dcddd7;padding:10px;border-top:none;font-size:12px;line-height:1.8;">';

        html += 'Pais: ' + ri.pais + ' | Cidade: ' + ri.cidade + '<br>';
        html += 'Morada: ' + ri.rua + '<br>';
        html += 'CEP: ' + ri.cep + ' | Tel: ' + ri.telefone + '';
        html += '</div>';
        html += '<div style="border:1px solid #dcddd7;padding:8px;background:#f0f5ff;font-weight:600;color:#1d2088;border-top:none;">物流轨迹详情</div>';
        html += '<table style="width:100%;border-collapse:collapse;">';
        html += '<tr style="background:#ededed;font-weight:600;">';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">时间</td>';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">地点</td>';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">状态描述</td>';
        html += '</tr>';
        for (var i = 0; i < recs.length; i++) {
            var r = recs[i];
            html += '<tr>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.time + '</td>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.location + '</td>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.desc + '</td>';
            html += '</tr>';
        }
        html += '</table></div>';
        document.getElementById('resultBody').innerHTML += html;
