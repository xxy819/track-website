<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title id="pageTitle">轨迹查询</title>
<meta name="description" content="物流追踪系统">
<meta name="keywords" content="物流,快递,追踪,轨迹查询">
<style type="text/css">
*{margin:0;padding:0;font:12px Verdana,Arial}
body{background:url(images/bg.png);background-attachment:fixed}
.div_l{float:left;width:550px;height:200px}
.div_r1{float:left;margin-top:50px;width:300px;height:200px}
.div_f{width:100%;height:260px}
.div_con{width:1300px;margin-top:10px;margin-left:auto;margin-right:auto}
.div_cont{float:left;height:auto;width:1100px;margin-bottom:20px}
.content{width:1100px;margin-left:auto;margin-right:auto}
.menu_search{width:460px;height:100px;margin-top:20px;margin-bottom:40px}
.search{width:250px;float:left;height:100px;border-radius:5px;border:2px solid #1291c5;resize:none;padding:5px;box-sizing:border-box;font-size:14px}
.input_search{float:left;width:90px;border-radius:5px;font-size:15px;height:50px;border:0;margin-top:20px;color:#fff;background:#1291c5;margin-left:20px;cursor:pointer}
.input_search:hover{border-radius:5px;background-color:#07bde4}
.div_canta{float:left;width:100%;margin-bottom:20px}
.div_tb_h{float:left;border:1px solid #dcddd7;width:100%;padding-top:10px;height:30px}
.danhao{float:left;width:300px;font-weight:600;margin-right:10px;color:#1d2088}
.hd{float:left;color:#F00;font-weight:600}
.menu_{width:100%}
.menu_ ul{width:100%;list-style:none;padding:0;margin:0}
.menu_ ul li{float:left;padding:5px;margin-bottom:1px;list-style:none;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:1px solid #dcddd7;box-sizing:border-box}
.abc{font-weight:600;background:#ededed;height:auto!important;padding:8px 5px!important}
.egtrcak{float:left;width:100px;height:60px;margin-left:90px;margin-top:50px}
.clearfix:after{content:"\20";display:block;height:0;line-height:0;font-size:0;clear:both}
.data-row{width:100%;float:left;margin-bottom:10px;border:1px solid #dcddd7}
.data-row .order-header{padding:6px 8px;background:#f0f5ff;font-weight:600;color:#1d2088;border-bottom:1px solid #dcddd7}
.data-row .order-info{padding:6px 8px;border-bottom:1px solid #dcddd7;background:#fff;line-height:1.8}
.data-row .order-info span{display:inline-block;margin-right:15px}
.data-row .order-info .label{color:#666}
.data-row .order-info .value{color:#333;font-weight:600}
.track-table{width:100%;border-collapse:collapse;border-top:none}
.track-table th,.track-table td{border:1px solid #dcddd7;padding:7px 8px;text-align:left;font-size:12px}
.track-table th{background:#ededed;font-weight:600}
.track-table tr:nth-child(even){background:#f9f9f9}
.no-data{text-align:center;padding:30px;color:#999;font-size:14px;border:1px solid #dcddd7;border-top:none}
.lang-bar{float:right;margin-top:10px;margin-right:20px}
.lang-bar a{display:inline-block;padding:4px 10px;margin-left:5px;border:1px solid #1291c5;border-radius:3px;color:#1291c5;text-decoration:none;cursor:pointer;font-size:12px}
.lang-bar a.active{background:#1291c5;color:#fff}
.lang-bar a:hover{background:#07bde4;color:#fff}
</style>
</head>
<body>

<div class="div_f">
<div class="div_con">
<div class="lang-bar" id="langBar">
<a href="javascript:void(0)" class="active" onclick="switchLang('zh')">中文</a>
<a href="javascript:void(0)" onclick="switchLang('es')">Espanol</a>
<a href="javascript:void(0)" onclick="switchLang('pt')">Portugues</a>
</div>
<div class="div_l">
<img src="images/logo.png" width="500" height="250">
</div>
<div class="div_r1">
<div class="menu_search">
<form action="javascript:void(0);" onsubmit="doQuery()">
<textarea name="documentCode" cols="20" rows="5" class="search" id="cno" placeholder="请输入您的追踪号码"></textarea>
<button class="input_search" type="submit" id="btnQuery">查询</button>
</form>
</div>
</div>
<div class="egtrcak">
<a href="javascript:void(0);" onclick="alert('英文版切换')"><img src="images/en.jpg"></a>
</div>
</div>
</div>

<div class="div_canta">
<div class="content clearfix">
<div class="div_con">
<div class="div_tb_h">
<div class="danhao" id="titlePrefix">【】<span id="lblShipInfo">运单信息</span></div>
<div class="hd" id="titleTicket"><span id="lblTicket">第</span>【】<span id="lblTicket2">票</span></div>
</div>
<div id="resultBody">
<div class="no-data" id="lblPrompt">请输入追踪号码进行查询</div>
</div>
</div>
</div>
</div>

<script type="text/javascript">
var LANG = {
zh: {
title:'轨迹查询', query:'查询', placeholder:'请输入您的追踪号码',
shipInfo:'运单信息', ticket:'第', ticket2:'票', pieces:'件数',
batchQuery:'批量查询', total:'共查询', found:'查到', notFound:'未查到',
refNo:'参考号', trackNo:'跟踪号码', dest:'目的地', localTime:'当地时间',
status:'最新状态', receiver:'', noData:'请输入追踪号码进行查询',
notFoundMsg:'未找到该运单信息', receiverInfo:'收件人信息',
trackDetail:'物流轨迹详情', time:'时间', location:'地点', desc:'状态描述',
nome:'Nome', pais:'País', cidade:'Cidade', rua:'Morada', cep:'CEP', tel:'Tel',
zh:'中文', es:'Espanol', pt:'Portugues'
},
es: {
title:'Seguimiento', query:'Consultar', placeholder:'Ingrese su número de seguimiento',
shipInfo:'Información del envío', ticket:'Nº', ticket2:'', pieces:'Bultos',
batchQuery:'Consulta múltiple', total:'Total', found:'Encontrados', notFound:'No encontrados',
refNo:'Referencia', trackNo:'Seguimiento', dest:'Destino', localTime:'Hora local',
status:'Estado actual', receiver:'', noData:'Ingrese su número de seguimiento',
notFoundMsg:'Envío no encontrado', receiverInfo:'Información del destinatario',
trackDetail:'Historial de seguimiento', time:'Fecha', location:'Ubicación', desc:'Estado',
nome:'Nombre', pais:'País', cidade:'Ciudad', rua:'Dirección', cep:'Código Postal', tel:'Teléfono'
},
pt: {
title:'Rastreio', query:'Pesquisar', placeholder:'Insira o número de rastreio',
shipInfo:'Informação do envio', ticket:'Nº', ticket2:'', pieces:'Volumes',
batchQuery:'Consulta múltipla', total:'Total', found:'Encontrados', notFound:'Não encontrados',
refNo:'Referência', trackNo:'Rastreio', dest:'Destino', localTime:'Hora local',
status:'Estado atual', receiver:'', noData:'Insira o número de rastreio',
notFoundMsg:'Envio não encontrado', receiverInfo:'Informação do destinatário',
trackDetail:'Histórico de rastreio', time:'Data', location:'Local', desc:'Estado',
nome:'Nome', pais:'País', cidade:'Cidade', rua:'Morada', cep:'Código Postal', tel:'Telefone'
}
};
var currentLang = 'zh';
function t(key){return LANG[currentLang][key]||key;}

function switchLang(lang){
currentLang=lang;
document.getElementById('pageTitle').textContent=t('title');
document.getElementById('cno').placeholder=t('placeholder');
var btn=document.getElementById('btnQuery');btn.textContent=t('query');
document.getElementById('lblShipInfo').textContent=t('shipInfo');
document.getElementById('lblTicket').textContent=t('ticket');
document.getElementById('lblTicket2').textContent=t('ticket2');
document.getElementById('lblPrompt').textContent=t('noData');
var items=document.querySelectorAll('#langBar a');
for(var i=0;i<items.length;i++){items[i].className='';}
var langMap={zh:0,es:1,pt:2};
if(langMap[lang]!==undefined){items[langMap[lang]].className='active';}
var input=document.getElementById('cno').value.trim();
if(input){doQuery();}
}
</script>
<script type="text/javascript">
var orderData = {};

function doQuery(){
var input=document.getElementById('cno').value.trim();
if(!input){alert(t('placeholder'));return;}
var codes=input.split(/[\n,，\s;；]+/).filter(function(c){return c.trim()!=='';});
if(codes.length===0){alert(t('placeholder'));return;}
var found=[],notFound=[];
for(var i=0;i<codes.length;i++){
var code=codes[i].trim();
var d=orderData[code];
if(d){found.push({code:code,data:d});}else{notFound.push(code);}
}
if(found.length===0){
document.getElementById('titlePrefix').innerHTML='【'+t('batchQuery')+'】'+t('shipInfo');
document.getElementById('titleTicket').innerHTML=t('ticket')+'0'+t('ticket2');
var msg='<div class="no-data">';
for(var i=0;i<notFound.length;i++){msg+=notFound[i]+' - '+t('notFoundMsg')+'<br>';}
msg+='</div>';
document.getElementById('resultBody').innerHTML=msg;
return;
}
document.getElementById('titlePrefix').innerHTML='【'+t('batchQuery')+'】'+t('total')+codes.length+t('pieces');
document.getElementById('titleTicket').innerHTML=t('found')+found.length+t('pieces')+'，'+t('notFound')+notFound.length+t('pieces');
var html='';
for(var n=0;n<found.length;n++){
var d=found[n].data,code=found[n].code;
html+='<div class="data-row">';
html+='<div class="order-header">'+code+'</div>';
html+='<div class="order-info">';
html+='<span><span class="label">'+t('refNo')+':</span> <span class="value">'+(d.refNo||'-')+'</span></span>';
html+='<span><span class="label">'+t('trackNo')+':</span> <span class="value">'+d.trackNo+'</span></span>';
html+='<span><span class="label">'+t('dest')+':</span> <span class="value">'+d.destination+'</span></span>';
html+='<span><span class="label">'+t('localTime')+':</span> <span class="value">'+d.localTime+'</span></span>';
html+='<span><span class="label">'+t('status')+':</span> <span class="value">'+d.status+'</span></span>';
html+='<span><span class="label">'+t('receiver')+':</span> <span class="value">'+(d.receiver||'-')+'</span></span>';
html+='</div>';
if(d.receiverInfo){
var ri=d.receiverInfo;
html+='<div class="order-info" style="border-bottom:1px solid #dcddd7;background:#fafafa">';
html+='<span class="label">'+t('receiverInfo')+':</span> ';
html+='</div>';
}
if(d.records&&d.records.length>0){
html+='<table class="track-table">';
html+='<tr><th>'+t('time')+'</th><th>'+t('location')+'</th><th>'+t('desc')+'</th></tr>';
for(var m=0;m<d.records.length;m++){
var r=d.records[m];
html+='<tr><td>'+r.time+'</td><td>'+r.location+'</td><td>'+r.desc+'</td></tr>';
}
html+='</table>';
}
html+='</div>';
}
if(notFound.length>0){
html+='<div class="no-data" style="margin-top:5px;">'+t('notFound')+'：'+notFound.join('、')+'</div>';
}
document.getElementById('resultBody').innerHTML=html;
}
</script>
</body>
</html>
