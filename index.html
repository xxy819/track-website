<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>轨迹查询</title>
    <meta name="description" content="物流追踪系统">
    <meta name="keywords" content="物流,快递,追踪,轨迹查询">
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            font: 12px Verdana, Arial;
        }
        body {
            background: url(images/bg.png);
            background-attachment: fixed;
        }
        .div_l { float: left; width: 550px; height: 200px; }
        .div_r1 { float: left; margin-top: 50px; width: 300px; height: 200px; }
        .div_f { width: 100%; height: 260px; }
        .div_con { width: 1300px; margin-top: 10px; margin-left: auto; margin-right: auto; }
        .div_cont { float: left; height: auto; width: 1100px; margin-bottom: 20px; }
        .content { width: 1100px; margin-left: auto; margin-right: auto; }
        .menu_search { width: 460px; height: 100px; margin-top: 20px; margin-bottom: 40px; }
        .search {
            width: 250px; float: left; height: 100px;
            border-radius: 5px; border: 2px solid #1291c5;
            resize: none; padding: 5px; box-sizing: border-box; font-size: 14px;
        }
        .input_search {
            float: left; width: 60px; border-radius: 5px;
            font-size: 20px; height: 50px; border: 0; margin-top: 20px;
            color: #fff; background: #1291c5; margin-left: 20px; cursor: pointer;
        }
        .input_search:hover { border-radius: 5px; background-color: #07bde4; }
        .div_canta { float: left; width: 100%; margin-bottom: 20px; }
        .div_tb_h { float: left; border: 1px solid #dcddd7; width: 100%; padding-top: 10px; height: 30px; }
        .danhao { float: left; width: 300px; font-weight: 600; margin-right: 10px; color: #1d2088; }
        .hd { float: left; color: #F00; font-weight: 600; }
        .menu_ { width: 100%; }
        .menu_ ul { width: 100%; list-style: none; padding: 0; margin: 0; }
        .menu_ ul li {
            float: left; padding: 5px; margin-bottom: 1px; list-style: none;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            border: 1px solid #dcddd7; box-sizing: border-box;
        }
        .div_li1 { width: 80px; background: #FFF; height: 15px; }
        .div_li2 { width: 200px; background: #FFF; height: 15px; }
        .div_li3 { width: 130px; background: #FFF; height: 15px; }
        .div_li4 { width: 360px; background: #FFF; height: 15px; }
        .div_li5 { width: 210px; background: #FFF; height: 15px; }
        .div_ck { float: left; width: 1100px; height: 25px; font-weight: 600; color: #6CF; }
        .men_li { float: left; width: 100%; min-height: 30px; }
        .men_li ul { width: 100%; list-style: none; padding: 0; margin: 0; }
        .men_li ul li {
            float: left; padding: 5px; margin-bottom: 1px; list-style: none;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            border: 1px solid #dcddd7; box-sizing: border-box;
        }
        .tabli1 { width: 140px; background: #FFF; }
        .tabli2 { width: 250px; background: #FFF; }
        .tabli3 { width: 620px; background: #FFF; }
        .abc { font-weight: 600; background: #ededed; height: auto !important; padding: 8px 5px !important; }
        .btnch {
            border: 0px; border-radius: 5px; padding: 2px 20px; color: #fff;
            width: 50px; height: 20px; background: #24296b; cursor: pointer;
        }
        .egtrcak { float: left; width: 100px; height: 60px; margin-left: 90px; margin-top: 50px; }
        .difmeam { width: 100%; min-height: 80px; }
        .ui-dialog.ui-dialog-reply { width: 560px; height: 300px; margin-left: -300px; margin-top: -180px; }
        .ui-dialog.ui-dialog-reply .ui-dialog-body { height: 500px; }
        #fileDialog img { cursor: pointer; transition: all 0.6s; }
        #fileDialog img:hover { transform: scale(3); margin-top: 100px; margin-left: 150px; margin-right: 150px; }
        .clearfix:after{content:"\20";display:block;height:0;line-height:0;font-size:0;clear:both}
        .hide { display: none; }
        .ui-dialog-cntainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;
        }
        .ui-dialog-cover {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
        }
        .ui-dialog {
            position: fixed; left: 50%; top: 50%; background: #fff;
            border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.3); z-index: 1001;
        }
        .ui-dialog-header { padding: 15px; border-bottom: 1px solid #e5e5e5; position: relative; }
        .ui-dialog-header h3 { font-size: 16px; font-weight: 600; }
        .ui-dialog-close {
            position: absolute; right: 15px; top: 15px;
            cursor: pointer; font-weight: bold; font-size: 16px; color: #999;
        }
        .ui-dialog-close:hover { color: #333; }
        .ui-dialog-footer { padding: 15px; text-align: center; border-top: 1px solid #e5e5e5; }
        .btn { display: inline-block; padding: 6px 12px; border-radius: 3px; cursor: pointer; }
        .btn-default { background: #fff; border: 1px solid #ccc; color: #333; }
        .btn-default:hover { background: #e6e6e6; }
        .cancel-dialog-btn { min-width: 80px; }
        .data-row { width: 100%; float: left; }
        .data-row ul { width: 100%; list-style: none; padding: 0; margin: 0; }
        .data-row ul li {
            float: left; padding: 8px 5px; margin-bottom: 1px; list-style: none;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            border: 1px solid #dcddd7; box-sizing: border-box;
        }
        .data-row ul li.data-col1 { width: 130px; }
        .data-row ul li.data-col2 { width: 130px; }
        .data-row ul li.data-col3 { width: 80px; }
        .data-row ul li.data-col4 { width: 200px; }
        .data-row ul li.data-col5 { width: 360px; }
        .data-row ul li.data-col6 { width: 130px; }
        .data-row ul li.op-col {
            width: 100%; border: none; padding: 3px 5px;
            text-align: right; background: #f9f9f9;
        }
        .data-row ul li.op-col button { margin-left: 5px; }
        .no-data { text-align: center; padding: 30px; color: #999; font-size: 14px; border: 1px solid #dcddd7; border-top: none; }
    </style>
</head>
<body>

<div class="div_f">
    <div class="div_con">
        <div class="div_l">
            <img src="images/logo.png" width="500" height="250">
        </div>
        <div class="div_r1">
            <div class="menu_search">
                <form action="javascript:void(0);" onsubmit="doQuery()">
                    <textarea name="documentCode" cols="20" rows="5" class="search" id="cno" placeholder="请输入您的追踪号码"></textarea>
                    <button class="input_search" type="submit">查询</button>
                </form>
            </div>
        </div>
        <div class="egtrcak">
            <a href="javascript:void(0);" onclick="alert('英文版切换')">
                <img src="images/en.jpg">
            </a>
        </div>
    </div>
</div>

<div class="div_canta">
    <div class="content clearfix">
        <div class="div_con">
            <div class="div_tb_h">
                <div class="danhao" id="titlePrefix">【】运单信息</div>
                <div class="hd" id="titleTicket">第【】票</div>
            </div>
            <div class="menu_" id="resultHeader">
                <ul>
                    <li class="div_li3 abc">参考号</li>
                    <li class="div_li3 abc">跟踪号码</li>
                    <li class="div_li1 abc">目的地</li>
                    <li class="div_li2 abc">当地时间</li>
                    <li class="div_li4 abc">最新状态</li>
                    <li class="div_li3 abc">收件人</li>
                </ul>
            </div>
            <div id="resultBody">
                <div class="no-data">请输入追踪号码进行查询</div>
            </div>
        </div>
    </div>
</div>

<!-- 查看附件弹窗 -->
<div class="ui-dialog-cntainer hide" id="fileDialog">
    <div class="ui-dialog-cover" onclick="fileCloseDailog()"></div>
    <div class="ui-dialog ui-dialog-reply" id="newAddress" style="height: 600px; width:600px;">
        <div class="ui-dialog-header">
            <div class="ui-dialog-close" onclick="fileCloseDailog()">X</div>
            <h3>查看附件</h3>
        </div>
        <table width="100%" border="0" cellpadding="0" cellspacing="0" style="padding-left: 10%;padding-top: 50px;" id="fileBody">
            <tbody></tbody>
        </table>
        <div class="ui-dialog-footer">
            <div onclick="fileCloseDailog()" class="btn btn-default btn-w-xs cancel-dialog-btn">关闭</div>
        </div>
    </div>
</div>

<script type="text/javascript">
    // 订单信息数据
    var orderData = {
        '00829000828097008840443925': {
            refNo: 'LKSH062223458689',
            trackNo: '00829000828097008840443925',
            destination: 'PT',
            localTime: '2026-06-29 10:00:00',
            status: '清关中/海关查验中',
            receiver: 'Raul Diniz Abreu Lopes',
            pieces: 1
        },
        '0082900082809700802494001': {
            refNo: '',
            trackNo: '0082900082809700802494001',
            destination: 'ES',
            localTime: '2026-06-22 23:48:25',
            status: '货物电子信息已经收到/',
            receiver: '',
            pieces: 1
        }
    };

    // 收件人完整信息
    var receiverInfo = {
        nome: 'Raul Diniz Abreu Lopes',
        pais: 'Portugal',
        cidade: 'Viseu',
        rua: 'Largo do Eiró N°2, Moselos, Campo, Viseu',
        cep: '3515-298',
        telefone: '925634946'
    };

    // 物流轨迹数据（最新在前）
    var trackRecords = [
        { time: '2026-06-29 10:00:00', location: 'Lisboa, PT', desc: '清关中/海关查验中' },
        { time: '2026-06-27 14:30:00', location: 'Lisboa, PT', desc: '货物到达目的地/等待清关' },
        { time: '2026-06-27 06:00:00', location: 'Frankfurt, DE', desc: '货物到达中转站/中转处理' },
        { time: '2026-06-25 22:00:00', location: '广州', desc: '货物已出运/航班已离港' },
        { time: '2026-06-25 15:00:00', location: '广州', desc: '出口报关完成' },
        { time: '2026-06-24 22:30:00', location: '广州', desc: '货物离开操作中心/广州' },
        { time: '2026-06-24 16:00:00', location: '广州', desc: '货物到达操作中心/广州' },
        { time: '2026-06-24 10:30:00', location: '深圳', desc: '货物已揽收' }
    ];

    function doQuery() {
        var code = document.getElementById('cno').value.trim();
        if (!code) { alert('请输入追踪号码'); return; }
        var d = orderData[code];
        if (!d) {
            document.getElementById('titlePrefix').innerHTML = '【' + code + '】运单信息';
            document.getElementById('titleTicket').innerHTML = '第0票';
            document.getElementById('resultBody').innerHTML = '<div class="no-data">未找到该运单信息</div>';
            return;
        }
        document.getElementById('titlePrefix').innerHTML = '【' + code + '】运单信息 件数:【' + d.pieces + '】';
        document.getElementById('titleTicket').innerHTML = '第1票';

        var html = '<div class="data-row">';
        html += '<ul>';
        html += '<li class="data-col1">' + (d.refNo || '&nbsp;') + '</li>';
        html += '<li class="data-col2">' + d.trackNo + '</li>';
        html += '<li class="data-col3">' + d.destination + '</li>';
        html += '<li class="data-col4">' + d.localTime + '</li>';
        html += '<li class="data-col5">' + d.status + '</li>';
        html += '<li class="data-col6">' + (d.receiver || '&nbsp;') + '</li>';
        html += '</ul>';
        html += '<div class="data-row" style="width:100%">';
        html += '    <ul>';
        html += '        <li class="op-col">';
        html += '            <button class="btnch" onclick="selectFile()">附件</button>';
        html += '            <button class="btnch" onclick="downloadTrackFile()">下载</button>';
        html += '            <button class="btnch" onclick="viewTrackDetail()">物流轨迹</button>';
        html += '        </li>';
        html += '    </ul>';
        html += '</div>';
        html += '</div>';
        document.getElementById('resultBody').innerHTML = html;
    }

    function selectFile() {
        var tableBody = document.querySelector('#fileBody tbody');
        tableBody.innerHTML = '<tr height="120px;"><td width="30%;" align="center"><img src="images/logo.png" width="120px;" height="100px;" /></td></tr>';
        document.getElementById('fileDialog').classList.remove('hide');
    }

    function fileCloseDailog() { document.getElementById('fileDialog').classList.add('hide'); }

    function downloadTrackFile() { alert('下载功能对接中'); }

    function viewTrackDetail() {
        var html = '<div class="menu_" style="margin-top:15px;">';
        html += '<div style="border:1px solid #dcddd7;padding:8px;background:#f0f5ff;font-weight:600;color:#1d2088;">收件人信息</div>';
        html += '<div style="border:1px solid #dcddd7;padding:10px;border-top:none;font-size:12px;line-height:1.8;">';
        html += 'Nome: ' + receiverInfo.nome + '<br>';
        html += 'País: ' + receiverInfo.pais + ' | Cidade: ' + receiverInfo.cidade + '<br>';
        html += 'Morada: ' + receiverInfo.rua + '<br>';
        html += 'CEP: ' + receiverInfo.cep + ' | Tel: ' + receiverInfo.telefone + '';
        html += '</div>';
        html += '<div style="border:1px solid #dcddd7;padding:8px;background:#f0f5ff;font-weight:600;color:#1d2088;border-top:none;">物流轨迹详情</div>';
        html += '<table style="width:100%;border-collapse:collapse;">';
        html += '<tr style="background:#ededed;font-weight:600;">';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">时间</td>';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">地点</td>';
        html += '<td style="border:1px solid #dcddd7;padding:8px;">状态描述</td>';
        html += '</tr>';
        for (var i = 0; i < trackRecords.length; i++) {
            var r = trackRecords[i];
            html += '<tr>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.time + '</td>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.location + '</td>';
            html += '<td style="border:1px solid #dcddd7;padding:8px;">' + r.desc + '</td>';
            html += '</tr>';
        }
        html += '</table></div>';
        document.getElementById('resultBody').innerHTML += html;
    }
</script>

</body>
</html>
